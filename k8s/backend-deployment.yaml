apiVersion: apps/v1
kind: Deployment
metadata:
  name: aigc-training-backend
  namespace: aigc-training
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: registry.example.com/aigc-backend:v1.0.0
        ports:
        - containerPort: 8000
        env:
        - name: ZHIPU_API_KEY
          valueFrom:
            secretKeyRef:
              name: aigc-secrets
              key: zhipu-api-key
        - name: TENCENT_API_KEY
          valueFrom:
            secretKeyRef:
              name: aigc-secrets
              key: tencent-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 3
          failureThreshold: 2
      imagePullSecrets:
      - name: registry-secret